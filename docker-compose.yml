services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crate_lynx}
      POSTGRES_USER: ${POSTGRES_USER:-crate_lynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crate_lynx}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crate_lynx}:${POSTGRES_PASSWORD:-crate_lynx}@127.0.0.1:5432/${POSTGRES_DB:-crate_lynx}
    ports:
      - "18102:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "18103:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: ./app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crate_lynx}:${POSTGRES_PASSWORD:-crate_lynx}@db:5432/${POSTGRES_DB:-crate_lynx}
      REDIS_URL: redis://redis:6379/0
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY in .env with a Fernet key}
      LIBRARY_ROOT: ${LIBRARY_ROOT:-/music}
      BEETS_LIBRARY: ${BEETS_LIBRARY:-/data/beets/library.db}
      CRATE_LYNX_STAGING_DIR: ${CRATE_LYNX_STAGING_DIR:-/tmp/crate-lynx}
      INGESTION_ROOT: ${INGESTION_ROOT:-/ingestion}
      M3U_OUTPUT_DIR: ${M3U_OUTPUT_DIR:-/data/m3u}
    ports:
      - "18101:8000"
    volumes:
      # Keep /ingestion and /soulseek in sync with DEFAULT_INGEST_FOLDER_PATHS in app/app/settings/models.py.
      - ${INGESTION_HOST_PATH:-/srv/mergerfs/hdds/music-in}:/ingestion
      - ${SOULSEEK_HOST_PATH:-/srv/mergerfs/hdds/soulseek/downloads}:/soulseek
      - ${MUSIC_HOST_PATH:-/srv/mergerfs/hdds/media/music}:/music
      - ${APP_DATA_HOST_PATH:-/docker/appdata/cratelynx}:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/healthz")
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app-ui:
    build:
      context: ./app-ui
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "18100:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
