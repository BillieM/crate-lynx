services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crate_lynx}
      POSTGRES_USER: ${POSTGRES_USER:-crate_lynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crate_lynx}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@127.0.0.1:5432/${POSTGRES_DB:-crate_lynx}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:18102:5432"
    volumes:
      - ${APP_DATA_HOST_PATH:-/docker/appdata/cratelynx}/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:18103:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ${APP_DATA_HOST_PATH:-/docker/appdata/cratelynx}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: ./app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crate_lynx}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-crate_lynx}
      REDIS_URL: redis://redis:6379/0
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?set TOKEN_ENCRYPTION_KEY in .env with a Fernet key}
      LIBRARY_ROOT: ${LIBRARY_ROOT:-/nas/media/music}
      LOCAL_DEDUPE_QUARANTINE_ROOT: ${LOCAL_DEDUPE_QUARANTINE_ROOT:-/nas/cratelynx/dedupe-quarantine}
      BEETS_LIBRARY: ${BEETS_LIBRARY:-/data/beets/library.db}
      CRATE_LYNX_STAGING_DIR: ${CRATE_LYNX_STAGING_DIR:-/nas/cratelynx/staging}
      INGESTION_ROOT: ${INGESTION_ROOT:-/nas/cratelynx/music-in}
      M3U_OUTPUT_DIR: ${M3U_OUTPUT_DIR:-/data/m3u}
      SLSKD_BASE_URL: ${SLSKD_BASE_URL:-}
      SLSKD_API_KEY: ${SLSKD_API_KEY:-}
      SLSKD_VERIFY_SSL: ${SLSKD_VERIFY_SSL:-true}
      SLSKD_SEARCH_POLL_TIMEOUT_SECONDS: ${SLSKD_SEARCH_POLL_TIMEOUT_SECONDS:-30}
      SLSKD_SEARCH_POLL_INTERVAL_SECONDS: ${SLSKD_SEARCH_POLL_INTERVAL_SECONDS:-2}
      SLSKD_WEBHOOK_TOKEN: ${SLSKD_WEBHOOK_TOKEN:-}
      SLSKD_DOWNLOADS_CONTAINER_ROOT: ${SLSKD_DOWNLOADS_CONTAINER_ROOT:-/data/soulseek/downloads}
      SLSKD_DOWNLOADS_APP_ROOT: ${SLSKD_DOWNLOADS_APP_ROOT:-/nas/soulseek/downloads}
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:18101:8000"
    volumes:
      # Keep /nas paths in sync with DEFAULT_INGEST_FOLDER_PATHS in app/app/settings/models.py.
      - ${NAS_DATA_HOST_PATH:-/mnt/nas_data}:/nas
      - ${APP_DATA_HOST_PATH:-/docker/appdata/cratelynx}/app:/data
    networks:
      - default
      - music
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/healthz")
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app-ui:
    build:
      context: ./app-ui
    depends_on:
      app:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cratelynx.rule=Host(`${CRATELYNX_HOST:-cratelynx.local}`)"
      - "traefik.http.routers.cratelynx.entrypoints=websecure"
      - "traefik.http.services.cratelynx.loadbalancer.server.port=80"
      - "traefik.http.routers.cratelynx.tls.certresolver=myresolver"
      - "traefik.docker.network=cratelynx"
    networks:
      - default
      - cratelynx
    ports:
      - "${UI_BIND_HOST:-127.0.0.1}:18100:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  cratelynx:
    name: cratelynx
  music:
    name: music
    external: true
