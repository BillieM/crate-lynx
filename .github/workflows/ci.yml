name: CI

on:
  pull_request:
  push:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crate_lynx_test
          POSTGRES_PASSWORD: crate_lynx_test
          POSTGRES_USER: crate_lynx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crate_lynx -d crate_lynx_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      REQUIRE_POSTGRES_TESTS: "1"
      TEST_DATABASE_URL: postgresql+psycopg://crate_lynx:crate_lynx_test@127.0.0.1:5432/crate_lynx_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          cache: pip
          python-version: 3.12.13
      - name: Install backend dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -r app/requirements.txt -r requirements-dev.txt
      - name: Lint backend
        run: .venv/bin/ruff check .
      - name: Check backend formatting
        run: .venv/bin/ruff format --check .
      - name: Test backend with PostgreSQL
        run: .venv/bin/pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: app-ui/package-lock.json
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser and accessibility smoke
        run: npm run test:browser:ci
